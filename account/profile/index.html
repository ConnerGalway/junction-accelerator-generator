<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Profile — eLearningU</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #11154b;
      --navy-mid:  #1d2260;
      --mint:      #aadab6;
      --mint-dark: #7fbf8e;
      --cream:     #fcf5ec;
      --muted:     #6b6b8a;
      --text:      #1a1a2e;
    }

    html, body {
      min-height: 100%;
      font-family: 'Open Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(17,21,75,0.12);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-text {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--navy);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .headline {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: var(--navy);
      text-align: center;
      margin-bottom: 12px;
    }

    .subhead {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.02em;
    }

    .input-group input {
      height: 52px;
      padding: 0 18px;
      border: 1.5px solid rgba(17,21,75,0.15);
      border-radius: 8px;
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(17,21,75,0.08);
    }

    .input-group input:disabled {
      background: rgba(17,21,75,0.04);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-submit {
      height: 52px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 8px;
    }

    .btn-submit:hover { background: var(--navy-mid); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-back {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .btn-back:hover {
      color: var(--navy);
      text-decoration: none;
    }

    .error-msg {
      display: none;
      padding: 14px 16px;
      background: #fff0f0;
      border: 1.5px solid #f5c0c0;
      border-radius: 8px;
      font-size: 13.5px;
      color: #b03030;
      line-height: 1.5;
    }

    .error-msg.visible { display: block; }

    .success-msg {
      display: none;
      padding: 14px 16px;
      background: #f0fff4;
      border: 1.5px solid #9ae6b4;
      border-radius: 8px;
      font-size: 13.5px;
      color: #276749;
      line-height: 1.5;
    }

    .success-msg.visible { display: block; }

    /* Loading state */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(17,21,75,0.1);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      color: var(--muted);
    }

    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-text">eLearningU</span>
  </div>

  <!-- Loading state (shown while fetching user data) -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p class="loading-text">Loading your profile...</p>
  </div>

  <!-- Profile form -->
  <div id="formContainer" style="display: none;">
    <h1 class="headline">Update Profile</h1>
    <p class="subhead">Update your account information below.</p>

    <form class="form" id="profileForm" novalidate>
      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          disabled
        >
      </div>

      <div class="input-group">
        <label for="firstName">First Name</label>
        <input
          type="text"
          id="firstName"
          name="firstName"
          placeholder="Enter your first name"
          autocomplete="given-name"
        >
      </div>

      <div class="input-group">
        <label for="lastName">Last Name</label>
        <input
          type="text"
          id="lastName"
          name="lastName"
          placeholder="Enter your last name"
          autocomplete="family-name"
        >
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg">Profile updated successfully!</div>

      <button type="submit" class="btn-submit" id="submitBtn">Save Changes</button>
    </form>

    <a href="javascript:history.back()" class="btn-back">Back</a>
  </div>

  <div class="footer" id="footer">
    <img src="/assets/elearningu-logo.png" alt="eLearningU" style="height:14px;width:auto;vertical-align:middle;opacity:0.45;"> &nbsp;&middot;&nbsp; Accelerator Dashboard
  </div>
</div>

<script src="/shared/supabase-client.js"></script>
<script>
  const loadingState   = document.getElementById('loadingState');
  const formContainer  = document.getElementById('formContainer');
  const profileForm    = document.getElementById('profileForm');
  const emailInput     = document.getElementById('email');
  const firstNameInput = document.getElementById('firstName');
  const lastNameInput  = document.getElementById('lastName');
  const errorMsg       = document.getElementById('errorMsg');
  const successMsg     = document.getElementById('successMsg');
  const submitBtn      = document.getElementById('submitBtn');

  // Load user data on page load
  async function loadUserProfile() {
    const { data: { session }, error } = await supabaseClient.auth.getSession();

    if (error || !session) {
      // Not logged in, redirect to login
      window.location.replace('/login');
      return;
    }

    const user = session.user;
    emailInput.value = user.email;
    firstNameInput.value = user.user_metadata?.first_name || '';
    lastNameInput.value = user.user_metadata?.last_name || '';

    loadingState.style.display = 'none';
    formContainer.style.display = 'block';
  }

  // Handle form submission
  profileForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const firstName = firstNameInput.value.trim();
    const lastName = lastNameInput.value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving...';
    errorMsg.classList.remove('visible');
    successMsg.classList.remove('visible');

    try {
      const { error } = await supabaseClient.auth.updateUser({
        data: {
          first_name: firstName,
          last_name: lastName
        }
      });

      if (error) throw error;

      successMsg.classList.add('visible');
      submitBtn.textContent = 'Saved!';

      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save Changes';
      }, 2000);

    } catch (err) {
      console.error('Profile update error:', err);
      errorMsg.textContent = err.message || 'Could not update profile. Please try again.';
      errorMsg.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save Changes';
    }
  });

  // Start loading
  loadUserProfile();
</script>

</body>
</html>
