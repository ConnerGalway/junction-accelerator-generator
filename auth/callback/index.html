<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in — eLearningU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #11154b;
      --mint:  #aadab6;
      --cream: #fcf5ec;
      --muted: #6b6b8a;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'Open Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
      padding: 32px;
    }

    /* Spinning ring in brand colours */
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(17,21,75,0.1);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading__logo {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--mint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .loading__text {
      font-size: 16px;
      color: var(--navy);
      font-weight: 500;
    }

    .loading__sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: -12px;
    }
  </style>
</head>
<body>

  <div class="loading">
    <!-- LOGO — replace with <img> when real logo is available -->
    <div class="loading__logo">eLearningU</div>
    <div class="spinner"></div>
    <p class="loading__text">Signing you in…</p>
    <p class="loading__sub">You'll be redirected in a moment.</p>
  </div>

  <script src="/shared/supabase-client.js"></script>
  <script>
    async function handleSession(session) {
      const userEmail = session.user.email;

      const { data: rows } = await supabaseClient
        .from('user_plans')
        .select('role, client_slug')
        .eq('email', userEmail)
        .eq('active', true);

      if (!rows || rows.length === 0) {
        window.location.replace('/login?error=access_denied');
        return;
      }

      const nonWildcard = rows.filter(r => r.client_slug !== '*');
      const wildcard    = rows.find(r => r.client_slug === '*');
      const primaryRow  = nonWildcard.length > 0 ? nonWildcard[0] : wildcard;
      const role        = primaryRow.role;

      if (role === 'client') {
        window.location.replace('/' + primaryRow.client_slug + '/');
      } else if (role === 'coach' || role === 'admin') {
        window.location.replace('/my-clients/');
      } else {
        window.location.replace('/login?error=access_denied');
      }
    }

    let handled = false;

    // Listen for the SIGNED_IN event fired when Supabase processes the URL hash token
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (handled) return;
      if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
        handled = true;
        subscription.unsubscribe();
        await handleSession(session);
      }
    });

    // Also check immediately — session may already be set if the hash was processed fast
    supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
      if (handled || !session) return;
      handled = true;
      subscription.unsubscribe();
      await handleSession(session);
    });

    // Timeout fallback — if nothing happens in 10s, give up
    setTimeout(() => {
      if (!handled) {
        handled = true;
        window.location.replace('/login?error=invalid_link');
      }
    }, 10000);
  </script>

</body>
</html>
