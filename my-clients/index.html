<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Clients — eLearningU Accelerator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #11154b;
      --navy-mid:  #1d2260;
      --mint:      #aadab6;
      --mint-dark: #7fbf8e;
      --cream:     #fcf5ec;
      --cream-mid: #f5ede0;
      --muted:     #6b6b8a;
      --text:      #1a1a2e;
      --border:    rgba(17,21,75,0.1);
    }

    html, body {
      min-height: 100%;
      font-family: 'Open Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* ── Top bar ────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      box-shadow: 0 2px 16px rgba(17,21,75,0.18);
    }

    /* LOGO — replace text with <img> when real logo is available */
    .topbar__logo {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--mint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar__email {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.01em;
    }

    .topbar__signout {
      height: 34px;
      padding: 0 16px;
      background: transparent;
      border: 1.5px solid rgba(170,218,182,0.45);
      border-radius: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--mint);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .topbar__signout:hover {
      background: rgba(170,218,182,0.1);
      border-color: var(--mint);
    }

    /* ── Main content ───────────────────────────────────── */
    .main {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 40px 80px;
    }

    /* ── Page header ────────────────────────────────────── */
    .page-header {
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease both;
    }

    .page-header__eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mint-dark);
      margin-bottom: 10px;
    }

    .page-header__title {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .page-header__sub {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Client list ────────────────────────────────────── */
    .client-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .client-card {
      display: flex;
      align-items: center;
      gap: 24px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      animation: fadeUp 0.5s ease both;
    }

    .client-card:hover {
      border-color: var(--navy);
      box-shadow: 0 4px 20px rgba(17,21,75,0.08);
      transform: translateY(-1px);
    }

    .client-card__main {
      flex: 1;
      min-width: 0;
    }

    .client-card__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .client-card__name {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
    }

    .client-card__week {
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      background: rgba(170,218,182,0.3);
      border: 1px solid rgba(127,191,142,0.5);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* Progress bar */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 7px;
      background: var(--cream-mid);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar__fill {
      height: 100%;
      background: var(--mint-dark);
      border-radius: 99px;
      transition: width 0.6s ease;
      min-width: 0;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      min-width: 80px;
      text-align: right;
    }

    /* Arrow */
    .client-card__arrow {
      font-size: 20px;
      color: rgba(17,21,75,0.25);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .client-card:hover .client-card__arrow {
      color: var(--navy);
      transform: translateX(3px);
    }

    /* ── Skeleton loading ───────────────────────────────── */
    .skeleton {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .skeleton__line {
      height: 14px;
      background: var(--cream-mid);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .skeleton__line--short { width: 40%; }
    .skeleton__line--long  { width: 65%; }
    .skeleton__line--bar   { width: 100%; height: 7px; margin-bottom: 0; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    /* ── Empty state ────────────────────────────────────── */
    .empty-state {
      padding: 48px 0;
      text-align: center;
      font-size: 15px;
      color: var(--muted);
    }

    /* ── Error state ────────────────────────────────────── */
    .error-state {
      padding: 20px 24px;
      background: #fff0f0;
      border: 1.5px solid #f5c0c0;
      border-radius: 10px;
      font-size: 14px;
      color: #b03030;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 24px 40px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      letter-spacing: 0.02em;
    }

    /* ── Animation ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger cards */
    .client-card:nth-child(1) { animation-delay: 0.05s; }
    .client-card:nth-child(2) { animation-delay: 0.10s; }
    .client-card:nth-child(3) { animation-delay: 0.15s; }
    .client-card:nth-child(4) { animation-delay: 0.20s; }
    .client-card:nth-child(5) { animation-delay: 0.25s; }

    /* ── Page header with actions ──────────────────────── */
    .page-header__row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .page-header__actions {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      border: none;
      text-decoration: none;
    }

    .btn-action--primary {
      background: var(--mint);
      color: var(--navy);
    }

    .btn-action--primary:hover {
      background: var(--mint-dark);
      transform: translateY(-1px);
    }

    .btn-action--secondary {
      background: white;
      color: var(--navy);
      border: 1.5px solid rgba(17,21,75,0.15);
    }

    .btn-action--secondary:hover {
      border-color: rgba(17,21,75,0.3);
      background: rgba(17,21,75,0.02);
    }

    .btn-action--danger {
      background: #b03030;
      color: white;
    }

    .btn-action--danger:hover {
      background: #9a2828;
    }

    .btn-action svg {
      width: 16px;
      height: 16px;
    }

    /* ── Project cards (expandable) ────────────────────── */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }

    .project-card:hover {
      border-color: rgba(17,21,75,0.2);
    }

    .project-card.expanded {
      border-color: var(--navy);
      box-shadow: 0 4px 20px rgba(17,21,75,0.08);
    }

    .project-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 20px;
    }

    .project-card__header:hover {
      background: rgba(17,21,75,0.02);
    }

    .project-card__info {
      flex: 1;
      min-width: 0;
    }

    .project-card__title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .project-card__name {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
    }

    .project-card__week {
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      background: rgba(170,218,182,0.3);
      border: 1px solid rgba(127,191,142,0.5);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    .project-card__user-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      background: rgba(17,21,75,0.06);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    .project-card__actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
      text-decoration: none;
    }

    .btn-icon:hover {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }

    .btn-icon--danger:hover {
      background: #b03030;
      border-color: #b03030;
      color: white;
    }

    .btn-icon--success:hover {
      background: #2d6a4f;
      border-color: #2d6a4f;
      color: white;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
    }

    .project-card__expand-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: transform 0.3s;
    }

    .project-card__expand-icon svg {
      width: 20px;
      height: 20px;
    }

    .project-card.expanded .project-card__expand-icon {
      transform: rotate(180deg);
    }

    /* Users section (collapsible) */
    .project-card__users {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      background: rgba(17,21,75,0.02);
      border-top: 1px solid transparent;
    }

    .project-card.expanded .project-card__users {
      max-height: 2000px;
      border-top-color: var(--border);
    }

    .project-card__users-inner {
      padding: 20px 28px;
    }

    /* ── Users table ───────────────────────────────────── */
    .users-table {
      width: 100%;
    }

    .users-table__header {
      display: grid;
      grid-template-columns: 2fr 100px 90px 1.5fr 110px 90px;
      gap: 16px;
      padding: 12px 16px;
      background: rgba(17,21,75,0.04);
      border-radius: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .users-table__body {
      margin-top: 8px;
    }

    .users-table__row {
      display: grid;
      grid-template-columns: 2fr 100px 90px 1.5fr 110px 90px;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
    }

    .users-table__row:hover {
      background: rgba(170,218,182,0.08);
    }

    .users-table__row:last-child {
      border-bottom: none;
    }

    .user-email {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-role {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .user-role--client {
      background: rgba(6,124,188,0.1);
      color: #067cbc;
    }

    .user-role--coach {
      background: rgba(170,218,182,0.3);
      color: #3d8b4d;
    }

    .user-role--admin {
      background: rgba(17,21,75,0.1);
      color: var(--navy);
    }

    .user-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .user-status--active {
      color: #3d8b4d;
    }

    .user-status--inactive {
      color: #b03030;
    }

    .user-status__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .user-status--active .user-status__dot {
      background: #3d8b4d;
    }

    .user-status--inactive .user-status__dot {
      background: #b03030;
    }

    .user-coach {
      font-size: 13px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-date {
      font-size: 13px;
      color: var(--text);
    }

    .user-actions {
      display: flex;
      gap: 6px;
    }

    .user-actions .btn-icon {
      width: 32px;
      height: 32px;
    }

    .user-actions .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .empty-users {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Modal ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,21,75,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: modalFadeIn 0.3s ease both;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modalFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .modal-card {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 40px 100px rgba(17,21,75,0.35);
      animation: modalSlideIn 0.35s cubic-bezier(0.34,1.26,0.64,1) both;
    }

    @keyframes modalSlideIn {
      from { transform: translateY(20px) scale(0.96); opacity: 0; }
      to { transform: none; opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-family: 'Raleway', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: rgba(17,21,75,0.06);
      color: var(--navy);
    }

    .modal-close svg {
      width: 20px;
      height: 20px;
    }

    .modal-body {
      padding: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-of-type {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1.5px solid rgba(17,21,75,0.15);
      border-radius: 8px;
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(17,21,75,0.08);
    }

    .form-group input:disabled {
      background: var(--cream);
      color: var(--muted);
      cursor: not-allowed;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      margin-top: 24px;
    }

    .form-error {
      padding: 14px 16px;
      background: #fff0f0;
      border: 1.5px solid #f5c0c0;
      border-radius: 8px;
      font-size: 13.5px;
      color: #b03030;
      margin-bottom: 20px;
    }

    /* ── Confirmation dialog ───────────────────────────── */
    .confirm-card {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(17,21,75,0.35);
      animation: modalSlideIn 0.35s cubic-bezier(0.34,1.26,0.64,1) both;
    }

    .confirm-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .confirm-icon svg {
      width: 28px;
      height: 28px;
    }

    .confirm-icon--warning {
      background: rgba(176,48,48,0.1);
      color: #b03030;
    }

    .confirm-icon--success {
      background: rgba(45,106,79,0.1);
      color: #2d6a4f;
    }

    .confirm-title {
      font-family: 'Raleway', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .confirm-message {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .confirm-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* ── Toast notifications ───────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10001;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--navy);
      color: white;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(17,21,75,0.25);
      animation: toastIn 0.35s cubic-bezier(0.34,1.26,0.64,1) both;
      max-width: 360px;
    }

    .toast--success {
      background: #2d6a4f;
    }

    .toast--error {
      background: #b03030;
    }

    .toast__icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .toast__message {
      font-size: 14px;
      font-weight: 500;
    }

    @keyframes toastIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: none; opacity: 1; }
    }

    @keyframes toastOut {
      from { transform: none; opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .page-header__row {
        flex-direction: column;
        gap: 16px;
      }

      .page-header__actions {
        width: 100%;
      }

      .page-header__actions .btn-action {
        flex: 1;
        justify-content: center;
      }

      .project-card__header {
        flex-wrap: wrap;
        gap: 16px;
      }

      .project-card__actions {
        width: 100%;
        justify-content: flex-end;
      }

      .users-table__header {
        display: none;
      }

      .users-table__row {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        background: white;
      }

      .users-table__row:hover {
        background: white;
      }

      .user-email {
        font-weight: 600;
        font-size: 15px;
      }

      .user-actions {
        justify-content: flex-end;
        margin-top: 8px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .modal-card {
        border-radius: 16px 16px 0 0;
        max-width: 100%;
        max-height: 90dvh;
        margin-top: auto;
        align-self: flex-end;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .confirm-card {
        margin: auto 16px;
      }
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 20px; }

        left: 16px;
        right: 16px;
        bottom: 16px;
      }

        max-width: none;
      }
    }
  </style>
</head>
<body data-page="my-clients">

  <!-- ══ TOP BAR ═══════════════════════════════════════════ -->

      <div class="skeleton">
        <div class="skeleton__line skeleton__line--long"></div>
        <div class="skeleton__line skeleton__line--short"></div>
        <div class="skeleton__line skeleton__line--bar"></div>
      </div>
      <div class="skeleton">
        <div class="skeleton__line skeleton__line--long"></div>
        <div class="skeleton__line skeleton__line--short"></div>
        <div class="skeleton__line skeleton__line--bar"></div>

  </main>

  <!-- ══ ADD/EDIT USER MODAL ═════════════════════════════════ -->
  <div id="userModal" class="modal-overlay" style="display:none" onclick="handleModalOverlayClick(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add User</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>

  <!-- ══ CONFIRMATION DIALOG ═════════════════════════════════ -->
  <div id="confirmDialog" class="modal-overlay" style="display:none" onclick="closeConfirm()">
    <div class="confirm-card" onclick="event.stopPropagation()">
      <div class="confirm-icon confirm-icon--warning" id="confirmIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </div>
      <h3 class="confirm-title" id="confirmTitle">Deactivate User?</h3>
      <p class="confirm-message" id="confirmMessage">
        This user will no longer be able to access their accelerator plan.
      </p>
      <div class="confirm-actions">
        <button class="btn-action btn-action--secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn-action btn-action--danger" id="confirmBtn" onclick="confirmAction()">Deactivate</button>
      </div>
    </div>
  </div>

  <!-- ══ TOAST CONTAINER ═════════════════════════════════════ -->
  <div id="toastContainer" class="toast-container"></div>

  <footer class="footer">eLearningU &nbsp;·&nbsp; &copy; 2026</footer>

  <script src="/shared/supabase-client.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/user-menu.js?v=2"></script>
  <script>
    // ══════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════
    let currentUser = null;
    let projects = [];          // Array of { slug, name, week, totalItems, checkedCount, users: [] }
    let allCoaches = [];        // For coach dropdown
    let allProjectSlugs = [];   // For project dropdown
    let expandedProjects = new Set();
    let editingUser = null;
    let pendingAction = null;

    // ══════════════════════════════════════════════════════════════
    // ICONS
    // ══════════════════════════════════════════════════════════════
    const ICONS = {
      userPlus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>`,
      externalLink: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`,
      chevronDown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`,
      edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
      userMinus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="22" y1="11" x2="16" y2="11"></line></svg>`,
      userCheck: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>`,
      checkCircle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
      alertCircle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`
    };

    // ══════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ══════════════════════════════════════════════════════════════
    (async function init() {
      // Wait for auth.js to verify the session and confirm coach/admin role
      const user = await window.__authReady;
      currentUser = user;

      // Show email in top bar
      document.getElementById('topbarEmail').textContent = user.email;

      // Initialize user menu (opens downward since it's in the topbar)
      window.initUserMenu('#userMenuContainer', user.email, user.role, 'down');

      // Load dashboard data
      await loadDashboardData();
    })();

    // ══════════════════════════════════════════════════════════════
    // DATA LOADING
    // ══════════════════════════════════════════════════════════════
    async function loadDashboardData() {
      const list = document.getElementById('projectList');
      const countEl = document.getElementById('clientCount');

      const isAdmin = currentUser.role === 'admin';

      // Fetch all users this person can manage
      let query = supabaseClient
        .from('user_plans')
        .select('email, client_slug, cohort_start_date, coach_email, role, active, timezone')
        .order('client_slug')
        .order('role');

      if (!isAdmin) {
        // Coaches see only their assigned projects
        query = query.eq('coach_email', currentUser.email);
      }

      const { data: allUsers, error: fetchError } = await query;

      if (fetchError) {
        list.innerHTML = `<div class="error-state">
          Could not load users. This is likely a permissions issue — make sure the
          additional RLS policies for coaches and admins have been applied in Supabase.
        </div>`;
        return;
      }

      // Also fetch coach list for dropdowns
      const { data: coaches } = await supabaseClient
        .from('user_plans')
        .select('email')
        .in('role', ['coach', 'admin'])
        .eq('active', true);

      allCoaches = [...new Set((coaches || []).map(c => c.email))].sort();

      // Group users by project (client_slug)
      const projectMap = new Map();

      for (const u of (allUsers || [])) {
        if (u.client_slug === '*') continue; // Skip wildcard admin rows

        if (!projectMap.has(u.client_slug)) {
          projectMap.set(u.client_slug, {
            slug: u.client_slug,
            name: toTitleCase(u.client_slug),
            users: [],
            cohort_start_date: u.cohort_start_date
          });
        }
        projectMap.get(u.client_slug).users.push(u);
      }

      projects = Array.from(projectMap.values());
      allProjectSlugs = projects.map(p => p.slug).sort();

      // Fetch progress for each project
      await Promise.all(projects.map(loadProjectProgress));

      renderProjects();
    }

    async function loadProjectProgress(project) {
      // Fetch plan.json for total count
      try {
        const res = await fetch(`/${project.slug}/plan.json`);
        if (res.ok) {
          const plan = await res.json();
          let total = 0;
          plan.weeks.forEach(w => {
            total += (w.actions || []).length;
            total += (w.checklist || []).length;
          });
          project.totalItems = total;
        }
      } catch (_) {
        project.totalItems = 0;
      }

      // Fetch checked count
      try {
        const { data } = await supabaseClient
          .from('progress')
          .select('checked')
          .eq('client_slug', project.slug);

        project.checkedCount = (data || []).filter(r => r.checked).length;
      } catch (_) {
        project.checkedCount = 0;
      }

      // Calculate week from first client's cohort start date
      if (project.cohort_start_date) {
        const start = new Date(project.cohort_start_date);
        const days = Math.floor((Date.now() - start.getTime()) / 86400000);
        project.week = Math.min(Math.max(Math.floor(days / 7) + 1, 1), 12);
      } else {
        project.week = 1;
      }
    }

    // ══════════════════════════════════════════════════════════════
    // RENDERING
    // ══════════════════════════════════════════════════════════════
    function renderProjects() {
      const container = document.getElementById('projectList');
      const countEl = document.getElementById('clientCount');

      if (projects.length === 0) {
        container.innerHTML = `<p class="empty-state">No projects found.</p>`;
        countEl.textContent = '0 projects';
        return;
      }

      const totalUsers = projects.reduce((sum, p) => sum + p.users.length, 0);
      countEl.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''} · ${totalUsers} user${totalUsers !== 1 ? 's' : ''}`;

      container.innerHTML = projects.map((project, idx) => {
        const isExpanded = expandedProjects.has(project.slug);
        const pct = project.totalItems > 0
          ? Math.round((project.checkedCount / project.totalItems) * 100)
          : 0;

        return `
          <div class="project-card ${isExpanded ? 'expanded' : ''}"
               data-slug="${project.slug}"
               style="animation-delay: ${idx * 0.05}s">
            <div class="project-card__header" onclick="toggleProject('${project.slug}')">
              <div class="project-card__info">
                <div class="project-card__title-row">
                  <h2 class="project-card__name">${project.name}</h2>
                  <span class="project-card__week">Week ${project.week} of 12</span>
                  <span class="project-card__user-count">${project.users.length} user${project.users.length !== 1 ? 's' : ''}</span>
                </div>
                <div class="progress-row">
                  <div class="progress-bar">
                    <div class="progress-bar__fill" style="width: ${pct}%"></div>
                  </div>
                  <span class="progress-label">${pct}% complete</span>
                </div>
              </div>
              <div class="project-card__actions">
                <button class="btn-icon" onclick="event.stopPropagation(); openAddUserModal('${project.slug}')" title="Add user to this project">
                  ${ICONS.userPlus}
                </button>
                <a href="/${project.slug}/" class="btn-icon" onclick="event.stopPropagation()" title="View plan">
                  ${ICONS.externalLink}
                </a>
                <div class="project-card__expand-icon">
                  ${ICONS.chevronDown}
                </div>
              </div>
            </div>
            <div class="project-card__users" id="users-${project.slug}">
              <div class="project-card__users-inner">
                ${renderUsersTable(project)}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderUsersTable(project) {
      if (project.users.length === 0) {
        return `<p class="empty-users">No users in this project yet.</p>`;
      }

      return `
        <div class="users-table">
          <div class="users-table__header">
            <span>Email</span>
            <span>Role</span>
            <span>Status</span>
            <span>Coach</span>
            <span>Cohort Start</span>
            <span>Actions</span>
          </div>
          <div class="users-table__body">
            ${project.users.map(user => renderUserRow(user, project.slug)).join('')}
          </div>
        </div>
      `;
    }

    function renderUserRow(user, projectSlug) {
      const canEdit = currentUser.role === 'admin' ||
                      (currentUser.role === 'coach' && user.coach_email === currentUser.email);

      return `
        <div class="users-table__row">
          <span class="user-email" title="${user.email}">${user.email}</span>
          <span class="user-role user-role--${user.role}">${user.role}</span>
          <span class="user-status user-status--${user.active ? 'active' : 'inactive'}">
            <span class="user-status__dot"></span>
            ${user.active ? 'Active' : 'Inactive'}
          </span>
          <span class="user-coach">${user.coach_email || '—'}</span>
          <span class="user-date">${formatDate(user.cohort_start_date)}</span>
          <div class="user-actions">
            ${canEdit ? `
              <button class="btn-icon" onclick="openEditUserModal('${user.email}', '${projectSlug}')" title="Edit user">
                ${ICONS.edit}
              </button>
              <button class="btn-icon ${user.active ? 'btn-icon--danger' : 'btn-icon--success'}" onclick="confirmToggleActive('${user.email}', '${projectSlug}')" title="${user.active ? 'Deactivate' : 'Activate'} user">
                ${user.active ? ICONS.userMinus : ICONS.userCheck}
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }

    // ══════════════════════════════════════════════════════════════
    // PROJECT EXPAND/COLLAPSE
    // ══════════════════════════════════════════════════════════════
    function toggleProject(slug) {
      if (expandedProjects.has(slug)) {
        expandedProjects.delete(slug);
      } else {
        expandedProjects.add(slug);
      }
      renderProjects();
    }

    // ══════════════════════════════════════════════════════════════
    // MODAL OPERATIONS
    // ══════════════════════════════════════════════════════════════
    function openAddUserModal(projectSlug = null) {
      editingUser = null;

      document.getElementById('modalTitle').textContent = 'Add User';
      document.getElementById('submitText').textContent = 'Add User';
      document.getElementById('userForm').reset();
      document.getElementById('editingEmail').value = '';
      document.getElementById('editingSlug').value = '';
      document.getElementById('formError').style.display = 'none';

      // Enable email field for new users
      document.getElementById('userEmail').disabled = false;

      // Populate dropdowns
      populateProjectDropdown(projectSlug);
      populateCoachDropdown();

      // Show/hide fields based on role
      updateFormFields();

      document.getElementById('userModal').style.display = 'flex';
    }

    function openEditUserModal(email, projectSlug) {
      const project = projects.find(p => p.slug === projectSlug);
      const user = project?.users.find(u => u.email === email);

      if (!user) return;

      editingUser = { ...user, projectSlug };

      document.getElementById('modalTitle').textContent = 'Edit User';
      document.getElementById('submitText').textContent = 'Save Changes';
      document.getElementById('editingEmail').value = email;
      document.getElementById('editingSlug').value = projectSlug;
      document.getElementById('formError').style.display = 'none';

      // Disable email field when editing
      document.getElementById('userEmail').value = email;
      document.getElementById('userEmail').disabled = true;

      document.getElementById('userRole').value = user.role;
      document.getElementById('userActive').value = user.active.toString();
      document.getElementById('userCohort').value = user.cohort_start_date || '';

      populateProjectDropdown(projectSlug);
      populateCoachDropdown(user.coach_email);

      // Disable project change when editing
      document.getElementById('userProject').disabled = true;

      updateFormFields();

      document.getElementById('userModal').style.display = 'flex';
    }

    function populateProjectDropdown(selectedSlug = null) {
      const select = document.getElementById('userProject');
      select.innerHTML = '<option value="">Select a project...</option>';
      select.disabled = false;

      allProjectSlugs.forEach(slug => {
        const option = document.createElement('option');
        option.value = slug;
        option.textContent = toTitleCase(slug);
        if (slug === selectedSlug) option.selected = true;
        select.appendChild(option);
      });
    }

    function populateCoachDropdown(selectedCoach = null) {
      const select = document.getElementById('userCoach');
      select.innerHTML = '<option value="">No coach assigned</option>';

      allCoaches.forEach(email => {
        const option = document.createElement('option');
        option.value = email;
        option.textContent = email;
        if (email === selectedCoach) option.selected = true;
        select.appendChild(option);
      });
    }

    function updateFormFields() {
      const role = document.getElementById('userRole').value;

      // Show/hide coach and cohort fields based on role
      const coachGroup = document.getElementById('coachGroup');
      const cohortGroup = document.getElementById('cohortGroup');

      if (role === 'admin') {
        coachGroup.style.display = 'none';
        cohortGroup.style.display = 'none';
      } else {
        coachGroup.style.display = 'block';
        cohortGroup.style.display = 'block';
      }
    }

    function closeModal() {
      const modal = document.getElementById('userModal');
      modal.style.animation = 'modalFadeOut 0.2s ease forwards';
      setTimeout(() => {
        modal.style.display = 'none';
        modal.style.animation = '';
        // Reset project dropdown disabled state
        document.getElementById('userProject').disabled = false;
      }, 200);
    }

    function handleModalOverlayClick(event) {
      if (event.target === event.currentTarget) {
        closeModal();
      }
    }

    async function handleFormSubmit(event) {
      event.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const submitText = document.getElementById('submitText');
      const errorEl = document.getElementById('formError');

      const originalText = submitText.textContent;
      submitBtn.disabled = true;
      submitText.textContent = 'Saving...';
      errorEl.style.display = 'none';

      try {
        const email = document.getElementById('userEmail').value.trim();
        const role = document.getElementById('userRole').value;
        const active = document.getElementById('userActive').value === 'true';
        const projectSlug = document.getElementById('userProject').value;
        const coachEmail = document.getElementById('userCoach').value || null;
        const cohortDate = document.getElementById('userCohort').value || null;

        if (!projectSlug) {
          throw new Error('Please select a project.');
        }

        const isEditing = !!editingUser;

        if (isEditing) {
          // Update existing record
          const { error } = await supabaseClient
            .from('user_plans')
            .update({
              role,
              active,
              coach_email: coachEmail,
              cohort_start_date: cohortDate
            })
            .eq('email', email)
            .eq('client_slug', projectSlug);

          if (error) throw error;

          showToast('User updated successfully', 'success');
        } else {
          // Insert new record
          const record = {
            email,
            client_slug: projectSlug,
            role,
            active,
            coach_email: coachEmail,
            cohort_start_date: cohortDate
          };

          const { error } = await supabaseClient
            .from('user_plans')
            .insert([record]);

          if (error) {
            if (error.code === '23505') { // Unique violation
              throw new Error('This user already exists in this project.');
            }
            throw error;
          }

          showToast('User added successfully', 'success');
        }

        closeModal();
        await loadDashboardData();

      } catch (err) {
        errorEl.textContent = err.message || 'An error occurred. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitText.textContent = originalText;
      }
    }

    // ══════════════════════════════════════════════════════════════
    // CONFIRMATION DIALOG
    // ══════════════════════════════════════════════════════════════
    function confirmToggleActive(email, projectSlug) {
      const project = projects.find(p => p.slug === projectSlug);
      const user = project?.users.find(u => u.email === email);

      if (!user) return;

      pendingAction = { email, projectSlug, newActive: !user.active };

      const iconEl = document.getElementById('confirmIcon');
      const titleEl = document.getElementById('confirmTitle');
      const messageEl = document.getElementById('confirmMessage');
      const btnEl = document.getElementById('confirmBtn');

      if (user.active) {
        iconEl.className = 'confirm-icon confirm-icon--warning';
        titleEl.textContent = 'Deactivate User?';
        messageEl.textContent = 'This user will no longer be able to access their accelerator plan.';
        btnEl.textContent = 'Deactivate';
        btnEl.className = 'btn-action btn-action--danger';
      } else {
        iconEl.className = 'confirm-icon confirm-icon--success';
        titleEl.textContent = 'Activate User?';
        messageEl.textContent = 'This user will regain access to their accelerator plan.';
        btnEl.textContent = 'Activate';
        btnEl.className = 'btn-action btn-action--primary';
      }

      document.getElementById('confirmDialog').style.display = 'flex';
    }

    async function confirmAction() {
      if (!pendingAction) return;

      const { email, projectSlug, newActive } = pendingAction;
      const btnEl = document.getElementById('confirmBtn');
      const originalText = btnEl.textContent;
      btnEl.disabled = true;
      btnEl.textContent = 'Saving...';

      try {
        const { error } = await supabaseClient
          .from('user_plans')
          .update({ active: newActive })
          .eq('email', email)
          .eq('client_slug', projectSlug);

        if (error) throw error;

        showToast(`User ${newActive ? 'activated' : 'deactivated'} successfully`, 'success');
        closeConfirm();
        await loadDashboardData();

      } catch (err) {
        showToast('Failed to update user status', 'error');
      } finally {
        btnEl.disabled = false;
        btnEl.textContent = originalText;
      }

      pendingAction = null;
    }

    function closeConfirm() {
      const dialog = document.getElementById('confirmDialog');
      dialog.style.animation = 'modalFadeOut 0.2s ease forwards';
      setTimeout(() => {
        dialog.style.display = 'none';
        dialog.style.animation = '';
      }, 200);
      pendingAction = null;
    }

    // ══════════════════════════════════════════════════════════════
    // TOAST NOTIFICATIONS
    // ══════════════════════════════════════════════════════════════
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');

      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `
        <span class="toast__icon">${type === 'success' ? ICONS.checkCircle : ICONS.alertCircle}</span>
        <span class="toast__message">${message}</span>
      `;

      container.appendChild(toast);

      // Auto-remove after 4 seconds
      setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // ══════════════════════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════════════════════
    function toTitleCase(slug) {
      return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
  </script>
