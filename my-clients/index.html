<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accelerator Projects — eLearningU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #11154b;
      --navy-mid:  #1d2260;
      --mint:      #aadab6;
      --mint-dark: #7fbf8e;
      --cream:     #fcf5ec;
      --cream-mid: #f5ede0;
      --muted:     #6b6b8a;
      --text:      #1a1a2e;
      --border:    rgba(17,21,75,0.1);
    }

    html, body {
      min-height: 100%;
      font-family: 'Open Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* ── Top bar ────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      box-shadow: 0 2px 16px rgba(17,21,75,0.18);
    }

    .topbar__logo {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--mint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar__email {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.01em;
    }

    /* ── Main content ───────────────────────────────────── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 40px 80px;
    }

    /* ── Page header ────────────────────────────────────── */
    .page-header {
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease both;
    }

    .page-header__eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mint-dark);
      margin-bottom: 10px;
    }

    .page-header__title {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .page-header__sub {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Project gallery ────────────────────────────────── */
    .project-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .project-card {
      display: block;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      animation: fadeUp 0.5s ease both;
    }

    .project-card:hover {
      border-color: var(--navy);
      box-shadow: 0 6px 24px rgba(17,21,75,0.1);
      transform: translateY(-2px);
    }

    .project-card__name {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .project-card__week {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .project-card__progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .project-card__bar {
      flex: 1;
      height: 8px;
      background: var(--cream-mid);
      border-radius: 4px;
      overflow: hidden;
    }

    .project-card__bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--mint-dark), var(--mint));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .project-card__percent {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      min-width: 40px;
      text-align: right;
    }

    /* ── Empty state ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state__icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      color: var(--border);
    }

    .empty-state__title {
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: var(--navy);
      margin-bottom: 8px;
    }

    /* ── Loading skeleton ───────────────────────────────── */
    .skeleton-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 28px;
    }

    .skeleton-line {
      background: linear-gradient(90deg, var(--cream-mid) 25%, var(--cream) 50%, var(--cream-mid) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    .skeleton-line--title {
      height: 20px;
      width: 70%;
      margin-bottom: 8px;
    }

    .skeleton-line--week {
      height: 14px;
      width: 40%;
      margin-bottom: 20px;
    }

    .skeleton-line--bar {
      height: 8px;
      width: 100%;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar {
        padding: 0 20px;
      }

      .main {
        padding: 32px 20px 60px;
      }

      .project-gallery {
        grid-template-columns: 1fr;
      }

      .topbar__email {
        display: none;
      }
    }
  </style>
</head>
<body data-page="my-clients">

  <!-- ══ TOP BAR ═══════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar__logo">eLearningU</div>
    <div class="topbar__right">
      <span class="topbar__email" id="topbarEmail"></span>
      <div id="userMenuContainer"></div>
    </div>
  </header>

  <!-- ══ MAIN ══════════════════════════════════════════════ -->
  <main class="main">

    <div class="page-header">
      <p class="page-header__eyebrow">Dashboard</p>
      <h1 class="page-header__title">Accelerator Projects</h1>
      <p class="page-header__sub" id="projectCount"></p>
    </div>

    <div class="project-gallery" id="projectGallery">
      <!-- Loading skeletons -->
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-line--title"></div>
        <div class="skeleton-line skeleton-line--week"></div>
        <div class="skeleton-line skeleton-line--bar"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-line--title"></div>
        <div class="skeleton-line skeleton-line--week"></div>
        <div class="skeleton-line skeleton-line--bar"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-line--title"></div>
        <div class="skeleton-line skeleton-line--week"></div>
        <div class="skeleton-line skeleton-line--bar"></div>
      </div>
    </div>

  </main>

  <footer class="footer">eLearningU &nbsp;&middot;&nbsp; &copy; 2026</footer>

  <script src="/shared/supabase-client.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/user-menu.js?v=2"></script>
  <script>
    // ══════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════
    let currentUser = null;
    let projects = [];

    // ══════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ══════════════════════════════════════════════════════════════
    (async function init() {
      const user = await window.__authReady;
      currentUser = user;

      document.getElementById('topbarEmail').textContent = user.email;
      window.initUserMenu('#userMenuContainer', user.email, user.role, 'down');

      await loadProjects();
    })();

    // ══════════════════════════════════════════════════════════════
    // DATA LOADING
    // ══════════════════════════════════════════════════════════════
    async function loadProjects() {
      const gallery = document.getElementById('projectGallery');
      const countEl = document.getElementById('projectCount');

      const isAdmin = currentUser.role === 'admin';
      const isPSM = currentUser.role === 'psm';

      // Fetch projects this user has access to
      let query = supabaseClient
        .from('user_plans')
        .select('client_slug, cohort_start_date')
        .eq('active', true)
        .neq('client_slug', '*');

      if (!isAdmin && !isPSM) {
        // Coaches see only their assigned projects
        query = query.eq('coach_email', currentUser.email);
      }

      const { data: rows, error } = await query;

      if (error) {
        gallery.innerHTML = `<div class="empty-state">
          <p>Could not load projects. Please try refreshing the page.</p>
        </div>`;
        return;
      }

      // Get unique projects
      const projectMap = new Map();
      for (const row of (rows || [])) {
        if (!projectMap.has(row.client_slug)) {
          projectMap.set(row.client_slug, {
            slug: row.client_slug,
            name: toTitleCase(row.client_slug),
            cohort_start_date: row.cohort_start_date
          });
        }
      }

      projects = Array.from(projectMap.values());

      if (projects.length === 0) {
        gallery.innerHTML = `<div class="empty-state">
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          <h3 class="empty-state__title">No projects yet</h3>
          <p>Projects you're assigned to will appear here.</p>
        </div>`;
        countEl.textContent = '';
        return;
      }

      // Load progress for each project
      await Promise.all(projects.map(loadProjectProgress));

      // Sort by name
      projects.sort((a, b) => a.name.localeCompare(b.name));

      countEl.textContent = `${projects.length} project${projects.length === 1 ? '' : 's'}`;
      renderProjects();
    }

    async function loadProjectProgress(project) {
      // Fetch plan.json for total item count
      try {
        const res = await fetch(`/${project.slug}/plan.json`);
        if (res.ok) {
          const plan = await res.json();
          let total = 0;
          plan.weeks.forEach(w => {
            total += (w.checklist || []).length;
          });
          project.totalItems = total;
        }
      } catch (_) {
        project.totalItems = 0;
      }

      // Fetch checked count from Supabase
      try {
        const { data } = await supabaseClient
          .from('progress')
          .select('checked')
          .eq('client_slug', project.slug);

        project.checkedCount = (data || []).filter(r => r.checked).length;
      } catch (_) {
        project.checkedCount = 0;
      }

      // Calculate current week from cohort start date
      if (project.cohort_start_date) {
        const start = new Date(project.cohort_start_date);
        const days = Math.floor((Date.now() - start.getTime()) / 86400000);
        project.week = Math.min(Math.max(Math.floor(days / 7) + 1, 1), 12);
      } else {
        project.week = 1;
      }
    }

    // ══════════════════════════════════════════════════════════════
    // RENDERING
    // ══════════════════════════════════════════════════════════════
    function renderProjects() {
      const gallery = document.getElementById('projectGallery');

      gallery.innerHTML = projects.map((p, i) => {
        const percent = p.totalItems > 0
          ? Math.round((p.checkedCount / p.totalItems) * 100)
          : 0;

        return `
          <a href="/${p.slug}/" class="project-card" style="animation-delay: ${i * 0.05}s">
            <h2 class="project-card__name">${p.name}</h2>
            <p class="project-card__week">Week ${p.week} of 12</p>
            <div class="project-card__progress">
              <div class="project-card__bar">
                <div class="project-card__bar-fill" style="width: ${percent}%"></div>
              </div>
              <span class="project-card__percent">${percent}%</span>
            </div>
          </a>
        `;
      }).join('');
    }

    // ══════════════════════════════════════════════════════════════
    // UTILITIES
    // ══════════════════════════════════════════════════════════════
    function toTitleCase(slug) {
      return slug
        .split('-')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }
  </script>
</body>
</html>
